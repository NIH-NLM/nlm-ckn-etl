name: Build JAR and publish to S3

# ── Triggers ─────────────────────────────────────────────────────────────────
# Runs on every push that touches Java source or the POM, on main/master, and
# can be triggered manually via the Actions UI.
on:
  push:
    branches: [main, master, prefect]
    paths:
      - "src/main/java/**"
      - "src/main/resources/**"
      - "pom.xml"
  workflow_dispatch:   # manual trigger from the Actions tab

# Only one build per branch at a time; cancel in-progress runs on new push.
concurrency:
  group: build-jar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: mvn package → S3
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # OIDC token for aws-actions/configure-aws-credentials
      contents: read

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java / Maven setup ─────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven   # caches ~/.m2 between runs

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build JAR (skip tests)
        run: mvn --batch-mode clean package -DskipTests

      - name: Verify JAR exists
        run: |
          JAR=$(ls target/nlm-ckn-etl-*.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR found in target/" && exit 1
          fi
          echo "JAR_PATH=$JAR" >> "$GITHUB_ENV"
          echo "Built: $JAR ($(du -h "$JAR" | cut -f1))"

      # ── Publish to S3 ──────────────────────────────────────────────────────
      # Requires these GitHub Actions secrets / variables to be configured:
      #   AWS_ROLE_TO_ASSUME  — ARN of an IAM role with s3:PutObject on the bucket
      #   S3_BUCKET           — bucket name (e.g. cell-kn-arangodb-data-952291113202)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upload JAR to S3
        env:
          COMMIT_SHA: ${{ github.sha }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          JAR_NAME=$(basename "$JAR_PATH")
          COMMIT_JAR="${JAR_NAME%.jar}-${COMMIT_SHA}.jar"

          # Always overwrite the canonical "latest" name so pipeline.py can
          # find it via a fixed path; also keep a commit-stamped copy for
          # traceability.
          aws s3 cp "$JAR_PATH" "s3://${S3_BUCKET}/artifacts/${JAR_NAME}"
          aws s3 cp "$JAR_PATH" "s3://${S3_BUCKET}/artifacts/${COMMIT_JAR}"

          echo "Uploaded:"
          echo "  s3://${S3_BUCKET}/artifacts/${JAR_NAME}  (latest)"
          echo "  s3://${S3_BUCKET}/artifacts/${COMMIT_JAR}  (commit-stamped)"

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          JAR_NAME=$(basename "$JAR_PATH")
          echo "## JAR Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| JAR | \`${JAR_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | $(du -h "$JAR_PATH" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 path | \`s3://${S3_BUCKET}/artifacts/${JAR_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
