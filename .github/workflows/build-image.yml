name: Build ETL image and push to ECR

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master, prefect]
    paths:
      - "Dockerfile"
      - "src/main/shell/fetch-entrypoint.sh"
      - "python/pyproject.toml"
      - "python/poetry.lock"
      - "python/src/**"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: docker build → ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Requires secrets/vars:
      #   AWS_ROLE_TO_ASSUME  — IAM role with ECR push permissions
      #   AWS_REGION          — e.g. us-east-1 (default: us-east-1)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx (for multi-stage cache support)
        uses: docker/setup-buildx-action@v3

      - name: Build and push nlm-ckn-etl image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          REPO="nlm-ckn-etl"
          IMAGE="${REGISTRY}/${REPO}"

          docker buildx build \
            --platform linux/amd64 \
            --cache-from "type=registry,ref=${IMAGE}:cache" \
            --cache-to   "type=registry,ref=${IMAGE}:cache,mode=max" \
            --build-arg  BUILDKIT_INLINE_CACHE=1 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${COMMIT_SHA}" \
            --push \
            .

          echo "IMAGE_URI=${IMAGE}:latest" >> "$GITHUB_ENV"

      - name: Write job summary
        if: always()
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          REPO="nlm-ckn-etl"
          IMAGE="${REGISTRY}/${REPO}"
          echo "## Docker Image Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${IMAGE}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit tag | \`${IMAGE}:${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
