AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NLM-CKN ArangoDB — a single EC2 instance running ArangoDB in Docker,
  with a dedicated EBS data volume so the graph survives instance replacement.

# ── Parameters ──────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which to launch the ArangoDB instance.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Subnet for the ArangoDB instance.  Use a private subnet (recommended)
      when the ETL instance is in the same VPC; use a public subnet only for
      development.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
    Description: EC2 instance type.  ArangoDB benefits from ≥4 GB RAM.

  ArangoDbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: >
      Root password for ArangoDB.  Store this in AWS Secrets Manager and
      reference it here (or pass it via the CLI with --parameter-overrides).

  ArangoDbPort:
    Type: Number
    Default: 8529
    Description: Port ArangoDB listens on (and is exposed on the instance).

  DataVolumeSize:
    Type: Number
    Default: 50
    Description: Size (GiB) of the EBS data volume for ArangoDB.

  AllowSshFrom:
    Type: String
    Default: "0.0.0.0/0"
    Description: >
      CIDR allowed to SSH into the instance.  Restrict to your IP or VPN
      range for production (e.g. 203.0.113.0/24).

  EtlSecurityGroupId:
    Type: String
    Default: ""
    Description: >
      (Optional) Security group ID of the ETL instance.  When provided,
      port 8529 is opened to that group only.  Leave empty to allow
      intra-VPC access on port 8529 from any source (0.0.0.0/0 inside the
      VPC is still gated by the VPC's network ACLs and route tables).

# ── Conditions ──────────────────────────────────────────────────────────────
Conditions:
  EtlSgProvided: !Not [!Equals [!Ref EtlSecurityGroupId, ""]]

# ── Resources ───────────────────────────────────────────────────────────────
Resources:

  # ── Security group ────────────────────────────────────────────────────────
  ArangoDbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ArangoDB EC2 instance — SSH and ArangoDB port
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowSshFrom
          Description: SSH
        - !If
          - EtlSgProvided
          - IpProtocol: tcp
            FromPort: !Ref ArangoDbPort
            ToPort: !Ref ArangoDbPort
            SourceSecurityGroupId: !Ref EtlSecurityGroupId
            Description: ArangoDB from ETL security group
          - IpProtocol: tcp
            FromPort: !Ref ArangoDbPort
            ToPort: !Ref ArangoDbPort
            CidrIp: 10.0.0.0/8
            Description: ArangoDB from within VPC (RFC-1918 10.x.x.x)
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-arangodb-sg"

  # ── IAM role (SSM + CloudWatch Logs) ──────────────────────────────────────
  ArangoDbRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-arangodb-role"

  ArangoDbInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ArangoDbRole

  # ── EBS data volume ───────────────────────────────────────────────────────
  # Separate from the root volume so data survives instance replacement.
  ArangoDbDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain   # keep data on stack deletion
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-arangodb-data"

  # ── EC2 instance ──────────────────────────────────────────────────────────
  ArangoDbInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref ArangoDbSecurityGroup
      IamInstanceProfile: !Ref ArangoDbInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log | logger -t user-data) 2>&1

          # ── System update & Docker ─────────────────────────────────────
          dnf update -y
          dnf install -y docker
          systemctl enable --now docker
          usermod -aG docker ec2-user

          # ── Attach and mount the data EBS volume ─────────────────────
          # Wait for the device to appear (may take a few seconds)
          DEVICE=/dev/xvdf
          for i in $(seq 1 30); do
            [ -b "$DEVICE" ] && break
            sleep 2
          done
          if ! blkid "$DEVICE" 2>/dev/null | grep -q ext4; then
            mkfs -t ext4 "$DEVICE"
          fi
          mkdir -p /var/lib/arangodb3
          echo "$DEVICE /var/lib/arangodb3 ext4 defaults,nofail 0 2" >> /etc/fstab
          mount -a

          # ── Pull and start ArangoDB ────────────────────────────────────
          docker pull arangodb:latest
          docker run -d \
            --name arangodb \
            --restart unless-stopped \
            -e ARANGO_ROOT_PASSWORD=${ArangoDbPassword} \
            -p ${ArangoDbPort}:8529 \
            -v /var/lib/arangodb3:/var/lib/arangodb3 \
            arangodb:latest

          # ── Signal completion ─────────────────────────────────────────
          /opt/aws/bin/cfn-signal -e $? \
            --stack  ${AWS::StackName} \
            --region ${AWS::Region} \
            --resource ArangoDbInstance || true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-arangodb"

  # ── Attach the data volume to the instance ────────────────────────────────
  ArangoDbVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref ArangoDbInstance
      VolumeId: !Ref ArangoDbDataVolume
      Device: /dev/xvdf

# ── Outputs ─────────────────────────────────────────────────────────────────
Outputs:

  ArangoDbInstanceId:
    Description: EC2 instance ID of the ArangoDB host.
    Value: !Ref ArangoDbInstance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  ArangoDbHost:
    Description: Private IP address of the ArangoDB instance (use within the VPC).
    Value: !GetAtt ArangoDbInstance.PrivateIp
    Export:
      Name: !Sub "${AWS::StackName}-ArangoDbHost"

  ArangoDbPort:
    Description: Port ArangoDB is listening on.
    Value: !Ref ArangoDbPort
    Export:
      Name: !Sub "${AWS::StackName}-ArangoDbPort"

  ArangoDbSecurityGroupId:
    Description: Security group ID attached to the ArangoDB instance.
    Value: !Ref ArangoDbSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"
