AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NLM-CKN ECR — container registry for the nlm-ckn-etl image.

  The single nlm-ckn-etl image serves both purposes:
    • The ETL pipeline  (entrypoint: python pipeline.py)
    • The scheduled fetch task (entrypoint: /usr/local/bin/fetch-entrypoint)

  Deploy this stack once, then push the image via CI/CD
  (.github/workflows/build-image.yml) or manually using the PushCommands output.

# ── Resources ───────────────────────────────────────────────────────────────
Resources:

  EtlImageRepo:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain   # keep images if the stack is deleted
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: nlm-ckn-etl
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep the last 5 images; expire older ones",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: nlm-ckn-etl

# ── Outputs ─────────────────────────────────────────────────────────────────
Outputs:

  RepositoryUri:
    Description: >
      Full ECR URI for the nlm-ckn-etl image.
      Use this as EcrImageUri in batch.yaml and as the image in fetch.yaml.
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/nlm-ckn-etl"
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryUri"

  RepositoryName:
    Description: ECR repository name.
    Value: !Ref EtlImageRepo
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryName"

  PushCommands:
    Description: >
      Manual push commands (CI/CD via build-image.yml handles this automatically
      on push to main/master/prefect).  Replace REGION and ACCOUNT_ID as needed.
    Value: !Sub |
      aws ecr get-login-password --region ${AWS::Region} \
        | docker login --username AWS --password-stdin \
          ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
      docker build --platform linux/amd64 \
        -t nlm-ckn-etl \
        .
      docker tag nlm-ckn-etl \
        ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/nlm-ckn-etl:latest
      docker push \
        ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/nlm-ckn-etl:latest
