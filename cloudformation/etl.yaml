AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NLM-CKN ETL — an EC2 instance that clones the repo, builds the Docker
  images, and runs pipeline.py against the ArangoDB stack.
  Deploy arangodb.yaml first and pass its stack name here.
  External API cache is read from S3 (produced by the fetch.yaml schedule).

# ── Parameters ──────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which to launch the ETL instance (must match the ArangoDB stack).

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Subnet for the ETL instance.  Must be able to reach the ArangoDB
      instance on port 8529 (same VPC, same or peered subnet).

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - c6i.2xlarge
    Description: >
      EC2 instance type.  The ETL spawns Docker build and run jobs for Maven,
      Java, and Python containers — recommend ≥8 GB RAM for the Java heap.

  ArangoDbStackName:
    Type: String
    Description: >
      Name of the arangodb.yaml CloudFormation stack.  The ETL instance reads
      its ArangoDbHost and ArangoDbPort outputs via cross-stack references.

  ArangoDbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: >
      Root password for ArangoDB.  Must match the value used when deploying
      the ArangoDB stack.

  S3Bucket:
    Type: String
    Default: "cell-kn-arangodb-data-952291113202"
    Description: >
      S3 bucket used for all pipeline data: external API cache (input from
      fetcher.py), NSForest results CSVs (input), tuple files (output), and
      final versioned archives (output).  Leave empty to run in local-only
      mode (no S3 sync).

  RepoUrl:
    Type: String
    Default: "https://github.com/NIH-NLM/nlm-ckn-etl.git"
    Description: Git URL of the nlm-ckn-etl repository to clone on the ETL instance.

  RepoBranch:
    Type: String
    Default: "prefect"
    Description: Git branch to check out.

  PipelineStageFlags:
    Type: String
    Default: "--run-results"
    AllowedValues:
      - "--run-results"
      - "--force-results"
      - "--run-ontology --run-results"
      - "--force-ontology --force-results"
      - "--run-ontology --run-results --run-archive"
      - "--force-ontology --force-results --force-archive"
    Description: Stage flags passed to pipeline.py.

  JavaOpts:
    Type: String
    Default: "-Xmx4g"
    Description: >
      JVM heap flags for Java containers (default -Xmx4g; raise if containers
      are OOM-killed, lower if the instance has limited RAM).

  AllowSshFrom:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed to SSH into the ETL instance.

# ── Conditions ──────────────────────────────────────────────────────────────
Conditions:
  HasS3Bucket: !Not [!Equals [!Ref S3Bucket, ""]]

# ── Resources ───────────────────────────────────────────────────────────────
Resources:

  # ── Security group ────────────────────────────────────────────────────────
  EtlSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NLM-CKN ETL — SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowSshFrom
          Description: SSH
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-etl-sg"

  # ── IAM role ──────────────────────────────────────────────────────────────
  EtlRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EtlS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - !If
                - HasS3Bucket
                - Effect: Allow
                  Action:
                    # Read: pull NSForest CSVs and external cache
                    - s3:GetObject
                    - s3:ListBucket
                    # Write: push tuples, archives, and build-info
                    - s3:PutObject
                    - s3:DeleteObject
                  Resource:
                    - !Sub "arn:aws:s3:::${S3Bucket}"
                    - !Sub "arn:aws:s3:::${S3Bucket}/*"
                - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-etl-role"

  EtlInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EtlRole

  # ── EC2 instance ──────────────────────────────────────────────────────────
  EtlInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EtlSecurityGroup
      IamInstanceProfile: !Ref EtlInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            # Generous root volume: Docker image cache + repo data can be large
            VolumeSize: 100
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -euxo pipefail
            exec > >(tee /var/log/user-data.log | logger -t user-data) 2>&1

            # ── System update & tools ────────────────────────────────────
            dnf update -y
            dnf install -y docker git python3.12 python3.12-pip java-21-amazon-corretto

            # Docker
            systemctl enable --now docker
            usermod -aG docker ec2-user

            # ── Python / Prefect + awscli ─────────────────────────────────
            python3.12 -m pip install --upgrade pip
            python3.12 -m pip install "prefect>=3.0" awscli

            # ── Clone repo ───────────────────────────────────────────────
            REPO_DIR=/opt/nlm-ckn-etl
            git clone --branch ${RepoBranch} ${RepoUrl} "$REPO_DIR"

            # ── Pre-pull Docker images (speeds up first pipeline run) ────
            docker pull eclipse-temurin:21
            docker pull maven:3-eclipse-temurin-21

            # Build the Python science image (needed before running results)
            cd "$REPO_DIR"
            docker build \
              --platform linux/amd64 \
              -t nlm-ckn-etl-python \
              -f src/main/shell/Dockerfile.python \
              . \
              || echo "WARNING: Python image build failed — pipeline will retry"

            # ── Write the ArangoDB password file ─────────────────────────
            echo -n '${ArangoDbPassword}' > "$REPO_DIR/.arangodb-password"
            chmod 600 "$REPO_DIR/.arangodb-password"

            # ── Run the ETL pipeline ─────────────────────────────────────
            # S3_BUCKET drives all S3 sync behaviour inside pipeline.py.
            # NSForest CSVs and external cache are pulled from S3 at the
            # start of the results stage; tuples and archives are pushed back.
            cd "$REPO_DIR/python"
            S3_BUCKET='${S3Bucket}' \
            ARANGO_DB_HOST=${ArangoDbHost} \
            ARANGO_DB_PORT=${ArangoDbPort} \
            python3.12 src/pipeline.py \
              ${PipelineStageFlags} \
              --java-opts '${JavaOpts}' \
              2>&1 | tee /var/log/nlm-ckn-etl.log

            # ── Signal CloudFormation ─────────────────────────────────────
            /opt/aws/bin/cfn-signal -e $? \
              --stack  ${AWS::StackName} \
              --region ${AWS::Region} \
              --resource EtlInstance || true
          - ArangoDbHost:
              Fn::ImportValue: !Sub "${ArangoDbStackName}-ArangoDbHost"
            ArangoDbPort:
              Fn::ImportValue: !Sub "${ArangoDbStackName}-ArangoDbPort"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-etl"

# ── Outputs ─────────────────────────────────────────────────────────────────
Outputs:

  EtlInstanceId:
    Description: EC2 instance ID of the ETL host.
    Value: !Ref EtlInstance

  EtlSecurityGroupId:
    Description: >
      Security group ID of the ETL instance.  Pass this to the ArangoDB
      stack's EtlSecurityGroupId parameter to open port 8529 only to this
      instance.
    Value: !Ref EtlSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  SshCommand:
    Description: SSH command to connect to the ETL instance.
    Value: !Sub "ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${EtlInstance.PublicIp}"

  PipelineLog:
    Description: Pipeline log location on the ETL instance.
    Value: /var/log/nlm-ckn-etl.log
