AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NLM-CKN Scheduled Fetch — runs fetcher.py on a cron schedule via ECS
  Fargate, writing the external API cache to S3.
  Deploy ecr.yaml and push the nlm-ckn-etl image before this stack.

# ── Parameters ──────────────────────────────────────────────────────────────
Parameters:

  EcrStackName:
    Type: String
    Description: >
      Name of the ecr.yaml CloudFormation stack.  The task definition pulls
      the nlm-ckn-etl image URI from its RepositoryUri export.

  S3Bucket:
    Type: String
    Default: "cell-kn-arangodb-data-952291113202"
    Description: >
      S3 bucket where external cache files are written.  Must already exist.

  NcbiEmail:
    Type: String
    Default: ""
    Description: NCBI E-Utilities email address (required for Gene/UniProt fetch).

  NcbiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: NCBI E-Utilities API key (improves rate limits).

  FetchSchedule:
    Type: String
    Default: "cron(0 * * * ? *)"
    Description: >
      EventBridge schedule expression for the fetch task.
      Default: every hour on the hour (UTC).
      Examples:
        cron(0 6 ? * SUN *)   — every Sunday at 06:00 UTC
        cron(0 */6 * * ? *)   — every 6 hours
        rate(1 hour)          — every hour

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which to run the Fargate task.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Subnets for the Fargate task.  Use private subnets with a NAT gateway
      (for outbound internet to external APIs) or public subnets with
      auto-assign public IP enabled.

  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: >
      ENABLED for public subnets (no NAT needed).
      DISABLED for private subnets (requires NAT gateway for internet access).

  TaskCpu:
    Type: Number
    Default: 2048
    AllowedValues: [256, 512, 1024, 2048, 4096]
    Description: Fargate task CPU units (1024 = 1 vCPU).

  TaskMemory:
    Type: Number
    Default: 8192
    AllowedValues: [512, 1024, 2048, 4096, 8192, 16384]
    Description: >
      Fargate task memory (MiB).  ExternalApiResultsFetcher.py imports scanpy
      and loads NSForest h5ad files to build gene ID lists; the science stack
      alone consumes ~3-4 GiB at import time.  8192 MiB is the recommended
      minimum; increase to 16384 if the task is still OOM-killed.

  EphemeralStorageGiB:
    Type: Number
    Default: 50
    MinValue: 21
    MaxValue: 200
    Description: >
      Ephemeral storage for the Fargate task (GiB).  The external cache
      files can reach several GB; 50 GiB is sufficient for most runs.

# ── Resources ───────────────────────────────────────────────────────────────
Resources:

  # ── ECS Cluster ───────────────────────────────────────────────────────────
  FetchCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-fetch"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      Tags:
        - Key: Project
          Value: nlm-ckn-etl

  # ── CloudWatch Log Group ───────────────────────────────────────────────────
  FetchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}-fetch"
      RetentionInDays: 30

  # ── IAM: Task Execution Role (ECR pull + CloudWatch Logs) ─────────────────
  FetchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Project
          Value: nlm-ckn-etl

  # ── IAM: Task Role (S3 read/write for external/ prefix) ───────────────────
  FetchTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FetchS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/external/*"
      Tags:
        - Key: Project
          Value: nlm-ckn-etl

  # ── Security Group ────────────────────────────────────────────────────────
  FetchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NLM-CKN fetch task — outbound only
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound (external APIs + S3 + ECR)
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-fetch-sg"

  # ── ECS Task Definition ───────────────────────────────────────────────────
  FetchTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-fetch"
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      EphemeralStorage:
        SizeInGiB: !Ref EphemeralStorageGiB
      ExecutionRoleArn: !GetAtt FetchExecutionRole.Arn
      TaskRoleArn: !GetAtt FetchTaskRole.Arn
      ContainerDefinitions:
        - Name: fetch
          Image: !Sub
            - "${RepoUri}:latest"
            - RepoUri:
                Fn::ImportValue: !Sub "${EcrStackName}-RepositoryUri"
          Command:
            - /usr/local/bin/fetch-entrypoint
          Environment:
            - Name: S3_BUCKET
              Value: !Ref S3Bucket
            - Name: NCBI_EMAIL
              Value: !Ref NcbiEmail
            - Name: NCBI_API_KEY
              Value: !Ref NcbiApiKey
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FetchLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: fetch
          Essential: true
      Tags:
        - Key: Project
          Value: nlm-ckn-etl

  # ── IAM: EventBridge Role (run ECS task) ──────────────────────────────────
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunFetchTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref FetchTaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt FetchExecutionRole.Arn
                  - !GetAtt FetchTaskRole.Arn

  # ── EventBridge Scheduler ─────────────────────────────────────────────────
  FetchScheduleRule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-fetch"
      Description: Hourly NLM-CKN external API fetch
      ScheduleExpression: !Ref FetchSchedule
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt FetchCluster.Arn
        RoleArn: !GetAtt EventBridgeRole.Arn
        EcsParameters:
          TaskDefinitionArn: !Ref FetchTaskDefinition
          LaunchType: FARGATE
          NetworkConfiguration:
            AwsvpcConfiguration:
              Subnets: !Ref SubnetIds
              SecurityGroups:
                - !Ref FetchSecurityGroup
              AssignPublicIp: !Ref AssignPublicIp
          TaskCount: 1

# ── Outputs ─────────────────────────────────────────────────────────────────
Outputs:

  FetchClusterName:
    Description: ECS cluster name for the fetch task.
    Value: !Ref FetchCluster

  FetchTaskDefinitionArn:
    Description: ARN of the ECS task definition (for manual test runs).
    Value: !Ref FetchTaskDefinition

  ManualRunCommand:
    Description: AWS CLI command to trigger a one-off fetch run.
    Value: !Sub
      - |
        aws ecs run-task \
          --cluster ${FetchCluster} \
          --task-definition ${TaskDef} \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[SUBNET_ID],securityGroups=[${FetchSecurityGroup}],assignPublicIp=${AssignPublicIp}}" \
          --region ${AWS::Region}
      - TaskDef: !Ref FetchTaskDefinition

  LogGroupName:
    Description: CloudWatch log group for the fetch task.
    Value: !Ref FetchLogGroup
